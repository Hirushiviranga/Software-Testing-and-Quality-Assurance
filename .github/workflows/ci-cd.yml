name: .NET Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    # 1. Checkout the code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 3. Restore dependencies
    - name: Restore dependencies
      run: dotnet restore Backend/Backend.csproj

    # 4. Build solution
    - name: Build solution
      run: dotnet build Backend/Backend.csproj --no-restore --configuration Release

    # 5. Run API in background
    - name: Run API in background
      shell: pwsh
      run: |
        Start-Process -NoNewWindow -FilePath "dotnet" -ArgumentList "run --project Backend/Backend.csproj --urls=http://localhost:5095"
        Start-Sleep -Seconds 10  # wait for server to start

    # 6. Test API availability
    - name: Test Calculator/add endpoint
      run: |
        curl http://localhost:5095/Calculator/add?a=5&b=3

    - name: Test CalculatorHistory endpoint
      run: |
        curl http://localhost:5095/CalculatorHistory

    # 7. Run unit tests (NUnit)
    - name: Run tests
      run: dotnet test Backend.Tests/Backend.Tests.csproj --no-build --verbosity normal

    # 8. Upload test results
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/


