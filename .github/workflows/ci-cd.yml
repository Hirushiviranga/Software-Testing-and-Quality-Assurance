name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    # Start backend API in background
    - name: Run backend API
      run: |
        nohup dotnet run --project Backend/Backend.csproj --urls "http://0.0.0.0:5095" > backend.log 2>&1 &
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          if curl -s http://127.0.0.1:5095/CalculatorHistory > /dev/null; then
            echo "API is ready!"
            break
          fi
          sleep 1
        done

    # Run backend + UI tests
    - name: Run tests
      run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test_results.trx"

    # Optional: upload test results
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: Backend.Tests/TestResults/test_results.trx
