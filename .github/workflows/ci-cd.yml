name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run API in background
      run: |
        Start-Job { dotnet run --project Backend/Backend.csproj --urls=http://localhost:5095 }
        Start-Sleep -Seconds 10   # wait for API to be up

    - name: Test API endpoint - Calculator Add
      run: |
        $response = Invoke-WebRequest -Uri "http://localhost:5095/Calculator/add?a=5&b=3" -UseBasicParsing
        Write-Output "Response: $($response.Content)"

    - name: Test API endpoint - Calculator History
      run: |
        $response = Invoke-WebRequest -Uri "http://localhost:5095/CalculatorHistory" -UseBasicParsing
        Write-Output "Response: $($response.Content)"

    - name: Run Tests
      run: dotnet test --no-build --verbosity normal

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/
